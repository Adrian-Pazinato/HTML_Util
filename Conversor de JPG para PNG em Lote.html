<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de JPG para PNG em Lote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Tailwind gray-100 */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 1rem; /* rounded-xl */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* shadow-xl */
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        .progress-list {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
            text-align: left;
        }
        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .progress-item:last-child {
            border-bottom: none;
        }
        .progress-item .status {
            font-weight: 600;
        }
        .status.processing {
            color: #3b82f6; /* Tailwind blue-600 */
        }
        .status.completed {
            color: #10b981; /* Tailwind green-500 */
        }
        .status.error {
            color: #ef4444; /* Tailwind red-500 */
        }
        input[type="file"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Conversor de JPG para PNG em Lote</h1>
        <p class="text-gray-600 mb-6">
            Selecione múltiplos arquivos JPG para convertê-los para o formato PNG.
        </p>

        <div class="mb-6">
            <label for="imageUpload" class="block text-lg font-medium text-gray-700 mb-2">
                Carregar Imagens (.jpg):
            </label>
            <input type="file" id="imageUpload" accept="image/jpeg" multiple class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <button id="startProcessingBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
            Iniciar Conversão
        </button>

        <div id="progressContainer" class="mt-8 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Progresso:</h2>
            <ul id="progressList" class="progress-list"></ul>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const startProcessingBtn = document.getElementById('startProcessingBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressList = document.getElementById('progressList');

        let selectedFiles = [];

        imageUpload.addEventListener('change', (event) => {
            selectedFiles = Array.from(event.target.files);
            if (selectedFiles.length > 0) {
                startProcessingBtn.disabled = false;
                // Exibe os arquivos a serem processados
                progressList.innerHTML = '';
                selectedFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.classList.add('progress-item');
                    li.innerHTML = `<span>${file.name}</span><span class="status">Aguardando...</span>`;
                    progressList.appendChild(li);
                });
                progressContainer.classList.remove('hidden');
            } else {
                startProcessingBtn.disabled = true;
                progressContainer.classList.add('hidden');
            }
        });

        startProcessingBtn.addEventListener('click', () => {
            if (selectedFiles.length === 0) {
                alert('Por favor, selecione as imagens JPG primeiro!');
                return;
            }
            startProcessingBtn.disabled = true;
            processBatch();
        });

        async function processBatch() {
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const listItem = progressList.children[i];
                const statusSpan = listItem.querySelector('.status');

                statusSpan.textContent = 'Processando...';
                statusSpan.classList.remove('completed', 'error');
                statusSpan.classList.add('processing');

                try {
                    const pngDataURL = await convertJpgToPng(file);
                    
                    // Extrai o nome do arquivo original sem a extensão e adiciona a nova extensão .png
                    const originalFileName = file.name.split('.').slice(0, -1).join('.');
                    const filename = `${originalFileName}.png`;
                    
                    // Inicia o download automático
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = pngDataURL;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    statusSpan.textContent = 'Concluído';
                    statusSpan.classList.remove('processing');
                    statusSpan.classList.add('completed');
                } catch (error) {
                    console.error(`Erro ao processar ${file.name}:`, error);
                    statusSpan.textContent = 'Erro';
                    statusSpan.classList.remove('processing');
                    statusSpan.classList.add('error');
                }
            }
            startProcessingBtn.disabled = false;
        }

        function convertJpgToPng(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const image = new Image();
                    image.onload = () => {
                        try {
                            // Cria um canvas off-screen para a conversão
                            const offscreenCanvas = document.createElement('canvas');
                            const ctx = offscreenCanvas.getContext('2d');
                            
                            offscreenCanvas.width = image.width;
                            offscreenCanvas.height = image.height;
                            
                            // Desenha a imagem JPG no canvas
                            ctx.drawImage(image, 0, 0);

                            // Converte o canvas para um Data URL no formato PNG
                            const pngDataURL = offscreenCanvas.toDataURL('image/png');
                            resolve(pngDataURL);
                        } catch (error) {
                            reject(error);
                        }
                    };
                    image.src = e.target.result;
                };
                reader.onerror = (error) => reject(error);
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
