<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDAGRAN - Autorização de Hora Extra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .document-page {
            width: 210mm;
            min-height: 148mm;
            padding: 20px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border: 2px solid #000;
            position: relative;
        }

        @media print {
            body {
                background: white;
            }

            .no-print {
                display: none;
            }

            .document-page {
                margin: 0;
                box-shadow: none;
                border: 2px solid #000;
            }
        }

        .line-input {
            border: none;
            border-bottom: 1px solid #000;
            outline: none;
            padding: 0 5px;
            background: transparent;
        }

        .header-border {
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 20px;
        }

        #logo-fida {
            width: 120px;
            height: auto;
        }
    </style>
</head>

<body class="p-4">

    <div class="max-w-4xl mx-auto mb-8 p-6 bg-white rounded-xl shadow-lg no-print">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Controles de Preenchimento</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Horário Inicial</label>
                <input type="time" id="inputInicio"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Horário Final</label>
                <input type="time" id="inputFim"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
            </div>
            <div class="flex items-end">
                <button onclick="window.print()"
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                    Imprimir Documento
                </button>
            </div>
        </div>
    </div>

    <div class="document-page" id="printableArea">
        <div class="header-border flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="text-center">
                    <img id="logo-fida" src="https://i.imghippo.com/files/zwd1348CAk.png" alt="Logo FIDA">
                </div>
            </div>

            <div class="text-right text-[11px] leading-tight">
                <h1 class="text-2xl font-black mb-1">FIDA</h1>
                <p class="font-bold">de Irmãos Cioccari & Cia. Ltda.</p>
                <p>BR 392 Km 253 - Fone: (55) 3281.1323</p>
                <p>CEP: 96570-000 - Caçapava do Sul - RS</p>
                <p>CNPJ: 87.675.831/0001-41</p>
            </div>
        </div>

        <div class="flex justify-between items-baseline mb-8">
            <h2 class="text-2xl font-black tracking-widest flex-grow text-center ml-20">AUTORIZAÇÃO DE HORA EXTRA</h2>
        </div>

        <div class="space-y-6 text-lg">
            <div class="flex items-end">
                <span>Autorizo o Sr. (a)</span>
                <input type="text" class="line-input flex-grow ml-2 font-bold" placeholder="Nome completo">
            </div>

            <div class="flex items-end gap-2 flex-wrap">
                <span>Setor:</span>
                <input type="text" class="line-input font-bold" placeholder="Setor">
                <span>, à realizar</span>
                <input type="text" id="displayHoras" class="line-input w-24 text-center font-bold text-blue-800"
                    readonly>
                <span> extras, no dia</span>
                <input type="date" class="line-input w-44 font-bold">
            </div>

            <div class="space-y-4">
                <label class="block">Justificativa da hora extra:</label>
                <textarea
                    class="w-full border-b border-black outline-none resize-none leading-[2.2rem] bg-transparent font-medium"
                    rows="3"
                    style="background-image: linear-gradient(transparent, transparent 34px, #000 34px); background-size: 100% 35px;"></textarea>
            </div>

            <div class="mt-16 pt-12 flex justify-start">
                <div class="w-2/3">
                    <div class="border-t border-black pt-1">
                        <span class="text-sm font-bold uppercase">Assinatura e o carimbo do encarregado:</span>
                        <input type="text" class="line-input w-full mt-1">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputInicio = document.getElementById('inputInicio');
        const inputFim = document.getElementById('inputFim');
        const displayHoras = document.getElementById('displayHoras');

        function calcularHoras() {
            const inicio = inputInicio.value;
            const fim = inputFim.value;

            if (inicio && fim) {
                const [h1, m1] = inicio.split(':').map(Number);
                const [h2, m2] = fim.split(':').map(Number);

                let totalMinutos = (h2 * 60 + m2) - (h1 * 60 + m1);

                if (totalMinutos < 0) {
                    totalMinutos += 24 * 60;
                }

                const horas = Math.floor(totalMinutos / 60);
                const minutos = totalMinutos % 60;

                let resultado = "";
                if (horas > 0) {
                    resultado += horas + (horas === 1 ? " hora" : " horas");
                }
                if (minutos > 0) {
                    resultado += (resultado ? " e " : "") + minutos + " min";
                }

                displayHoras.value = resultado || "0";
            } else {
                displayHoras.value = "";
            }
        }

        inputInicio.addEventListener('change', calcularHoras);
        inputFim.addEventListener('change', calcularHoras);
    </script>
</body>

</html>
