<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDA - Autorização de Hora Extra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .document-page {
            width: 210mm;
            min-height: 148mm; /* Meia folha A4 aproximadamente */
            padding: 40px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border: 2px solid #000;
            position: relative;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .document-page { 
                margin: 0; 
                box-shadow: none;
                border: 2px solid #000;
            }
        }

        .line-input {
            border: none;
            border-bottom: 1px solid #000;
            outline: none;
            padding: 0 5px;
            background: transparent;
        }

        .header-border {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 30px;
        }

        #logo-fida {
            width: 140px;
            height: auto;
        }

        /* Estilo para as linhas da justificativa */
        .justificativa-input {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            line-height: 2.5rem;
            background-image: linear-gradient(transparent, transparent 39px, #000 39px);
            background-size: 100% 40px;
            background-attachment: local;
            font-family: inherit;
        }
    </style>
</head>
<body class="p-4">

    <!-- Painel de Controle (Não sai na impressão) -->
    <div class="max-w-4xl mx-auto mb-8 p-6 bg-white rounded-xl shadow-lg no-print">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Controles de Preenchimento</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Horário Inicial</label>
                <input type="time" id="inputInicio" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Horário Final</label>
                <input type="time" id="inputFim" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
            </div>
            <div class="flex items-end">
                <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                    Imprimir Documento
                </button>
            </div>
        </div>
    </div>

    <!-- Documento -->
    <div class="document-page" id="printableArea">
        <!-- Cabeçalho -->
        <div class="header-border flex justify-between items-center">
            <div class="flex items-center">
                <img id="logo-fida" src="https://i.imghippo.com/files/zwd1348CAk.png" alt="Logo FIDA">
            </div>
            
            <div class="text-right text-[12px] leading-tight">
                <h1 class="text-2xl font-black mb-1">FIDA</h1>
                <p class="font-bold text-sm">Irmãos Cioccari & Cia. Ltda.</p>
                <p>BR 392 Km 253 - Fone: (55) 3281.1323</p>
                <p>CEP: 96570-000 - Caçapava do Sul - RS</p>
                <p>CNPJ: 87.675.831/0001-41</p>
            </div>
        </div>

        <!-- Título -->
        <div class="text-center mb-10">
            <h2 class="text-2xl font-black tracking-[0.2em] border-b-2 border-black inline-block pb-1">AUTORIZAÇÃO DE HORA EXTRA</h2>
        </div>

        <!-- Corpo do Formulário -->
        <div class="space-y-8 text-lg">
            <!-- Linha 1 -->
            <div class="flex items-end">
                <span class="whitespace-nowrap">Autorizo o Sr. (a)</span>
                <input type="text" class="line-input flex-grow ml-2 font-bold" placeholder="Nome completo do colaborador">
            </div>

            <!-- Linha 2 -->
            <div class="flex items-end gap-2">
                <span class="whitespace-nowrap">Setor:</span>
                <input type="text" class="line-input flex-grow font-bold" placeholder="Departamento">
                <span class="whitespace-nowrap">, a realizar</span>
                <input type="text" id="displayHoras" class="line-input w-40 text-center font-bold text-blue-900" placeholder="0 horas" readonly>
            </div>

            <!-- Linha 3 -->
            <div class="flex items-end gap-2">
                <span class="whitespace-nowrap">extras, no dia</span>
                <input type="date" class="line-input flex-grow font-bold">
                <span class="whitespace-nowrap">.</span>
            </div>

            <!-- Justificativa -->
            <div class="pt-4">
                <label class="block mb-2 font-bold">Justificativa da hora extra:</label>
                <textarea class="justificativa-input font-medium" rows="3"></textarea>
            </div>

            <!-- Assinatura -->
            <div class="mt-20 flex justify-center">
                <div class="w-3/4 text-center">
                    <div class="border-t border-black pt-2">
                        <p class="text-sm font-black uppercase tracking-wider">Assinatura e carimbo do encarregado</p>
                        <input type="text" class="line-input w-full text-center mt-2 italic" placeholder="(Nome do responsável)">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const inputInicio = document.getElementById('inputInicio');
        const inputFim = document.getElementById('inputFim');
        const displayHoras = document.getElementById('displayHoras');

        function calcularHoras() {
            const inicio = inputInicio.value;
            const fim = inputFim.value;

            if (inicio && fim) {
                const [h1, m1] = inicio.split(':').map(Number);
                const [h2, m2] = fim.split(':').map(Number);

                let totalMinutos = (h2 * 60 + m2) - (h1 * 60 + m1);

                // Caso passe da meia-noite
                if (totalMinutos < 0) {
                    totalMinutos += 24 * 60;
                }

                const horas = Math.floor(totalMinutos / 60);
                const minutos = totalMinutos % 60;

                let resultado = "";
                if (horas > 0) {
                    resultado += horas + (horas === 1 ? " hora" : " horas");
                }
                if (minutos > 0) {
                    resultado += (resultado ? " e " : "") + minutos + " min";
                }

                displayHoras.value = resultado || "0";
            } else {
                displayHoras.value = "";
            }
        }

        inputInicio.addEventListener('change', calcularHoras);
        inputFim.addEventListener('change', calcularHoras);
    </script>
</body>
</html>
