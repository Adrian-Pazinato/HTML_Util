<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autismo Musical</title>
    <link rel="icon" type="image/png" href="https://win98icons.alexmeub.com/icons/png/cd_drive-0.png">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aero-blue: #0078d7;
            --aero-sky: #e1effa;
            --aero-green: #32cd32;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1a3a5a;
            --glossy-gradient: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
        }

        body {
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 40%),
                linear-gradient(180deg, #4facfe 0%, #00f2fe 45%, #2af598 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: var(--glossy-gradient);
            pointer-events: none;
            z-index: 1;
        }

        h1 {
            color: var(--aero-blue);
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 2;
        }

        p.subtitle {
            color: #4a6a8a;
            margin-bottom: 2rem;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }

        .input-group {
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 2;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 700;
            color: var(--aero-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #b4d3ee;
            color: var(--text-dark);
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        input[type="text"]:focus {
            border-color: var(--aero-blue);
            box-shadow: 0 0 15px rgba(0, 120, 215, 0.3), inset 0 2px 5px rgba(0,0,0,0.05);
            transform: scale(1.02);
        }

        .links-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 2;
        }

        .link-card {
            display: block;
            padding: 20px;
            background: linear-gradient(to bottom, #ffffff 0%, #f0f7ff 100%);
            color: var(--aero-blue);
            text-decoration: none;
            border: 1px solid #c8d9e7;
            border-radius: 20px;
            transition: all 0.4s ease;
            font-weight: 700;
            opacity: 0.6;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .link-card.active {
            opacity: 1;
            pointer-events: auto;
            border: 2px solid #a0c4ff;
            background: linear-gradient(to bottom, #ffffff 0%, #e6f2ff 100%);
        }

        .link-card.active:hover {
            transform: translateY(-5px);
            background: linear-gradient(to bottom, #e6f2ff 0%, #ffffff 100%);
            box-shadow: 0 8px 25px rgba(0, 120, 215, 0.2);
            border-color: var(--aero-blue);
        }

        .link-card span {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: #6a8ead;
            margin-top: 8px;
            word-break: break-all;
            background: rgba(255,255,255,0.5);
            padding: 4px 10px;
            border-radius: 10px;
        }

        #status {
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6a8ead;
            position: relative;
            z-index: 2;
        }

        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>---------</h1>

        <div class="input-group">
            <label for="artistId">𝕥𝕙𝕖 𝕗𝕦𝕥𝕦𝕣𝕖 𝕚𝕤 𝕓𝕣𝕚𝕘𝕙𝕥</label>
            <input type="text" id="artistId" placeholder="Cole o ID aqui..." autocomplete="off">
        </div>

        <div class="links-area">
            <a href="#" id="link1" class="link-card" target="_blank" rel="noopener noreferrer">
                Artist Tools
                <span id="url1">https://app.artist.tools/artist/...</span>
            </a>

            <a href="#" id="link2" class="link-card" target="_blank" rel="noopener noreferrer">
                Every Noise
                <span id="url2">https://everynoise.com/artistprofile.cgi?id=...</span>
            </a>
        </div>

        <p id="status">Aguardando entrada de dados...</p>
    </div>

    <script>
        const inputField = document.getElementById('artistId');
        const link1 = document.getElementById('link1');
        const link2 = document.getElementById('link2');
        const urlDisplay1 = document.getElementById('url1');
        const urlDisplay2 = document.getElementById('url2');
        const statusText = document.getElementById('status');

        const baseUrls = {
            artistTools: "https://app.artist.tools/artist/",
            everyNoise: "https://everynoise.com/artistprofile.cgi?id="
        };

        inputField.addEventListener('input', function () {
            const value = this.value.trim();

            if (value.length > 0) {
                const finalUrl1 = baseUrls.artistTools + value;
                link1.href = finalUrl1;
                urlDisplay1.textContent = finalUrl1;
                link1.classList.add('active');

                const finalUrl2 = baseUrls.everyNoise + value;
                link2.href = finalUrl2;
                urlDisplay2.textContent = finalUrl2;
                link2.classList.add('active');

                statusText.textContent = "Sistema pronto. Clique nos links acima.";
                statusText.style.color = "#32cd32";
            } else {
                link1.href = "#";
                link2.href = "#";
                urlDisplay1.textContent = "https://app.artist.tools/artist/...";
                urlDisplay2.textContent = "https://everynoise.com/artistprofile.cgi?id=...";
                link1.classList.remove('active');
                link2.classList.remove('active');
                statusText.textContent = "Aguardando entrada de dados...";
                statusText.style.color = "#6a8ead";
            }
        });
    </script>
</body>

</html>
