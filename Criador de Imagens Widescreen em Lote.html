<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Imagens Widescreen em Lote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Tailwind gray-100 */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 1rem; /* rounded-xl */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* shadow-xl */
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        .progress-list {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
            text-align: left;
        }
        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .progress-item:last-child {
            border-bottom: none;
        }
        .progress-item .status {
            font-weight: 600;
        }
        .status.processing {
            color: #3b82f6; /* Tailwind blue-600 */
        }
        .status.completed {
            color: #10b981; /* Tailwind green-500 */
        }
        .status.error {
            color: #ef4444; /* Tailwind red-500 */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Criador de Imagens Widescreen em Lote</h1>
        <p class="text-gray-600 mb-6">
            Selecione múltiplos arquivos de imagem para processá-los automaticamente em formato widescreen.
        </p>

        <div class="mb-6">
            <label for="imageUpload" class="block text-lg font-medium text-gray-700 mb-2">
                Carregar Imagens:
            </label>
            <input type="file" id="imageUpload" accept="image/*" multiple class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent cursor-pointer">
        </div>

        <button id="startProcessingBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
            Iniciar Processamento
        </button>

        <div id="progressContainer" class="mt-8 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Progresso:</h2>
            <ul id="progressList" class="progress-list"></ul>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const startProcessingBtn = document.getElementById('startProcessingBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressList = document.getElementById('progressList');

        let selectedFiles = [];

        // Constants for processing
        const TARGET_WIDTH = 1920;
        const TARGET_HEIGHT = 1080;
        const WIDESCREEN_ASPECT_RATIO = TARGET_WIDTH / TARGET_HEIGHT;
        const DEFAULT_BLUR_RADIUS = 5;
        const DEFAULT_FG_SCALE = 1.0;
        const DEFAULT_BG_POSITION = 0;

        imageUpload.addEventListener('change', (event) => {
            selectedFiles = Array.from(event.target.files);
            if (selectedFiles.length > 0) {
                startProcessingBtn.disabled = false;
                // Display files to be processed
                progressList.innerHTML = '';
                selectedFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.classList.add('progress-item');
                    li.innerHTML = `<span>${file.name}</span><span class="status processing">Aguardando...</span>`;
                    progressList.appendChild(li);
                });
                progressContainer.classList.remove('hidden');
            } else {
                startProcessingBtn.disabled = true;
                progressContainer.classList.add('hidden');
            }
        });

        startProcessingBtn.addEventListener('click', () => {
            if (selectedFiles.length === 0) {
                alert('Por favor, selecione as imagens primeiro!');
                return;
            }
            startProcessingBtn.disabled = true;
            processBatch();
        });

        async function processBatch() {
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const listItem = progressList.children[i];
                const statusSpan = listItem.querySelector('.status');

                statusSpan.textContent = 'Processando...';
                statusSpan.classList.remove('processing', 'completed', 'error');
                statusSpan.classList.add('processing');

                try {
                    const processedImageURL = await processImage(file);
                    const originalFileName = file.name.split('.').slice(0, -1).join('.');
                    // A linha abaixo foi alterada para remover o sufixo "-widescreen"
                    const filename = `${originalFileName}.png`;
                    
                    // Trigger automatic download
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = processedImageURL;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    statusSpan.textContent = 'Concluído';
                    statusSpan.classList.remove('processing');
                    statusSpan.classList.add('completed');
                } catch (error) {
                    console.error(`Erro ao processar ${file.name}:`, error);
                    statusSpan.textContent = 'Erro';
                    statusSpan.classList.remove('processing');
                    statusSpan.classList.add('error');
                }
            }
            startProcessingBtn.disabled = false;
        }

        function processImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const originalImage = new Image();
                    originalImage.onload = () => {
                        try {
                            const offscreenCanvas = document.createElement('canvas');
                            const ctx = offscreenCanvas.getContext('2d');

                            const originalWidth = originalImage.width;
                            const originalHeight = originalImage.height;

                            // Define as dimensões do canvas com a nova resolução fixa de 1920x1080
                            offscreenCanvas.width = TARGET_WIDTH;
                            offscreenCanvas.height = TARGET_HEIGHT;
                            ctx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);

                            // 1. Draw blurred background
                            let bgSourceX = 0, bgSourceY = 0, bgSourceWidth = originalWidth, bgSourceHeight = originalHeight;
                            const bgAspectRatio = originalWidth / originalHeight;
                            const canvasAspectRatio = offscreenCanvas.width / offscreenCanvas.height;

                            if (bgAspectRatio > canvasAspectRatio) {
                                bgSourceWidth = originalHeight * canvasAspectRatio;
                                const excessWidth = originalWidth - bgSourceWidth;
                                bgSourceX = excessWidth * ((DEFAULT_BG_POSITION + 50) / 100);
                            } else {
                                bgSourceHeight = originalWidth / canvasAspectRatio;
                                const excessHeight = originalHeight - bgSourceHeight;
                                bgSourceY = excessHeight * ((DEFAULT_BG_POSITION + 50) / 100);
                            }

                            const tempOffscreenCanvas = document.createElement('canvas');
                            const tempOffscreenCtx = tempOffscreenCanvas.getContext('2d');
                            tempOffscreenCanvas.width = offscreenCanvas.width;
                            tempOffscreenCanvas.height = offscreenCanvas.height;
                            tempOffscreenCtx.drawImage(originalImage, bgSourceX, bgSourceY, bgSourceWidth, bgSourceHeight, 0, 0, offscreenCanvas.width, offscreenCanvas.height);

                            const imageData = tempOffscreenCtx.getImageData(0, 0, tempOffscreenCanvas.width, tempOffscreenCanvas.height);
                            applySimpleBlur(ctx, imageData, DEFAULT_BLUR_RADIUS);

                            // 2. Draw foreground image
                            const imgAspectRatio = originalWidth / originalHeight;
                            let imgDrawWidth, imgDrawHeight;

                            if (imgAspectRatio > WIDESCREEN_ASPECT_RATIO) {
                                imgDrawWidth = offscreenCanvas.width;
                                imgDrawHeight = imgDrawWidth / imgAspectRatio;
                            } else {
                                imgDrawHeight = offscreenCanvas.height;
                                imgDrawWidth = imgDrawHeight * imgAspectRatio;
                            }

                            imgDrawWidth *= DEFAULT_FG_SCALE;
                            imgDrawHeight *= DEFAULT_FG_SCALE;

                            const imgX = (offscreenCanvas.width - imgDrawWidth) / 2;
                            const imgY = (offscreenCanvas.height - imgDrawHeight) / 2;
                            
                            ctx.drawImage(originalImage, imgX, imgY, imgDrawWidth, imgDrawHeight);

                            resolve(offscreenCanvas.toDataURL('image/png'));
                        } catch (error) {
                            reject(error);
                        }
                    };
                    originalImage.src = e.target.result;
                };
                reader.onerror = (error) => reject(error);
                reader.readAsDataURL(file);
            });
        }

        function applySimpleBlur(context, imageData, radius) {
            if (radius === 0) return;
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = imageData.width;
            tempCanvas.height = imageData.height;
            tempCtx.putImageData(imageData, 0, 0);
            tempCtx.filter = `blur(${radius}px)`;
            tempCtx.drawImage(tempCanvas, 0, 0);
            context.drawImage(tempCanvas, 0, 0, imageData.width, imageData.height);
            tempCtx.filter = 'none';
        }
    </script>
</body>
</html>
